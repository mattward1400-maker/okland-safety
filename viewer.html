<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Okland Manual Viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; display: flex; flex-direction: column; height: 100vh; }
      #toolbar { background: #1a1a1a; padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #F5C400; flex-shrink: 0; }
      .logo { width: 32px; height: 32px; background: #F5C400; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #1a1a1a; flex-shrink: 0; }
      .title { color: #fff; font-size: 14px; font-weight: 500; flex: 1; }
      .page-info { color: #F5C400; font-size: 13px; font-weight: 600; }
      #back-btn { background: #F5C400; color: #1a1a1a; border: none; border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
      #viewer { flex: 1; width: 100%; border: none; }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <div class="logo">O</div>
      <div class="title" id="doc-title">Okland Manual</div>
      <div class="page-info" id="page-info"></div>
      <a href="/" id="back-btn">← Back to Chat</a>
    </div>
    <iframe id="viewer"></iframe>

    <script>
      const params = new URLSearchParams(window.location.search);
      const doc = params.get('doc');
      const page = parseInt(params.get('page')) || 1;

      const docs = {
        'oshm': { file: '/OSHM.pdf', title: 'Okland Specific Manual (OSHM)' },
        'sshm': { file: '/SSHM.pdf', title: 'Subcontractor Specific Manual (SSHM)' }
      };

      const selected = docs[doc] || docs['sshm'];
      document.getElementById('doc-title').textContent = selected.title;
      document.getElementById('page-info').textContent = 'Page ' + page;
      document.getElementById('viewer').src = selected.file + '#page=' + page;
    </script>
  </body>
</html>
